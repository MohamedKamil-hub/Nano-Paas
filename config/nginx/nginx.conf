events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name mohamedkamil.es www.mohamedkamil.es;
        location / {
            set $upstream http://nebula-static:80;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    server {
        listen 80;
        server_name pulse.mohamedkamil.es;
        location / {
            set $upstream http://nebula-pulse:2019;
            proxy_pass $upstream;
            proxy_set_header Host $host;
        }
    }

    server {
        listen 80;
        server_name wp.mohamedkamil.es;
        location / {
            set $upstream http://wordpress-app:80;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 80;
        server_name app.mohamedkamil.es;
        location / {
            set $upstream http://python-app:5000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
        }
    }
}
